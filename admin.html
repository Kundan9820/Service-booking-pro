<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | ServiceBookingPro</title>

    <style>
        body {
            background: #eef2f7;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        header {
            background: #111;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .dashboard {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 12px;
            margin-top: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .refresh-btn,
        .download-btn {
            background: #ff6600;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .refresh-btn:hover,
        .download-btn:hover {
            background: #e05600;
        }
        
        .search-box input {
            padding: 10px;
            width: 260px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th {
            background: #ff6600;
            color: white;
            padding: 12px;
            text-align: left;
        }
        
        table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        .btn-delete {
            background: red;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        
        .btn-delete:hover {
            background: darkred;
        }
        
        .status-badge {
            padding: 5px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .pending {
            background: orange;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="booking.html">Book Now</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>
    </header>

    <div class="dashboard">
        <h2>📋 All User Bookings</h2>

        <div class="top-bar">
            <button class="refresh-btn" onclick="loadBookings()">🔄 Refresh</button>

            <div class="search-box">
                <input type="text" id="search" placeholder="Search by name..." onkeyup="filterTable()">
            </div>
        </div>

        <table id="bookingsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Service</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Payment</th>
                    <th>Discount</th>
                    <th>Offer</th>
                    <th>Message</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td colspan="12">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadBookings() {
            const tableBody = document.querySelector("#bookingsTable tbody");
            tableBody.innerHTML = "<tr><td colspan='12'>Loading...</td></tr>";

            try {
                const response = await fetch("http://localhost:8080/api/bookings");
                const bookings = await response.json();

                if (bookings.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='12'>No bookings found.</td></tr>";
                    return;
                }

                tableBody.innerHTML = bookings.map(b => `
        <tr>
          <td>${b.id}</td>
          <td>${b.fullName}</td>
          <td>${b.email}</td>
          <td>${b.serviceType}</td>
          <td>${b.date}</td>
          <td>${b.location || '-'}</td>
          <td>${b.paymentMethod || '-'}</td>
          <td>${b.discountApplied ? "Yes" : "No"}</td>
          <td>${b.offerCode || '-'}</td>
          <td>${b.message || '-'}</td>
          <td><span class="status-badge pending">Pending</span></td>
          <td><button class="btn-delete" onclick="deleteBooking(${b.id})">Delete</button></td>
        </tr>
      `).join('');

            } catch (err) {
                console.error(err);
                tableBody.innerHTML = "<tr><td colspan='12'>❌ Error loading data.</td></tr>";
            }
        }

        async function deleteBooking(id) {
            if (!confirm("Delete booking ID " + id + "?")) return;

            try {
                await fetch(`http://localhost:8080/api/bookings/${id}`, {
                    method: "DELETE"
                });
                alert("Booking deleted!");
                loadBookings();
            } catch (error) {
                alert("Error deleting booking.");
            }
        }

        function filterTable() {
            let input = document.getElementById("search").value.toUpperCase();
            let rows = document.querySelectorAll("#bookingsTable tbody tr");

            rows.forEach(row => {
                let name = row.children[1].innerText.toUpperCase();
                row.style.display = name.includes(input) ? "" : "none";
            });
        }

        window.onload = loadBookings;
    </script>

</body>

</html>
